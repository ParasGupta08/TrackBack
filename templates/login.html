{% extends "layout.html" %}


{%block title%}
Login
{%endblock%}


{% block main %}
<div class="row justify-content-center">
    <div class="col-md-5">

        <h3 class="mb-4 text-center">Log In</h3>

        <form action="/login" method="post">
            <div class="mb-3">
                <input
                    class="form-control"
                    name="username"
                    placeholder="Username"
                    autocomplete="off"
                    required
                >
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
            </div>

            <div class="d-grid">
                <button class="btn btn-primary" type="submit">
                    Log In
                </button>
            </div>
        </form>

        <p class="mt-3 text-center">
            Don’t have an account?
            <a href="/register">Register</a>
        </p>

    </div>
</div>
{% endblock %}
