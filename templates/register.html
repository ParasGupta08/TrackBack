{% extends "layout.html" %}


{%block title%}
Register
{%endblock%}


{% block main %}
<div class="row justify-content-center">
    <div class="col-md-5">

        <h3 class="mb-4 text-center">Register</h3>

        <form action="/register" method="post">
            <div class="mb-3">
                <input
                    class="form-control"
                    name="username"
                    placeholder="Username"
                    autocomplete="off"
                    required
                >
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    type="password"
                    name="confirmation"
                    placeholder="Confirm Password"
                    required
                >
            </div>

            <div class="d-grid">
                <button class="btn btn-success" type="submit">
                    Register
                </button>
            </div>
        </form>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="/login">Log in</a>
        </p>

    </div>
</div>
{% endblock %}
